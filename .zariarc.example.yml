# .zariarc.example.yml — Example Zaria configuration
# Copy to .zariarc.yml in your project root and customise as needed.
version: 1

project:
  name: "My Web Application"
  type: web          # web | mobile | desktop | library
  language: typescript  # typescript | javascript | python | go

audit:
  dimensions:
    - performance
    - architecture
    - scalability
    - integrity
    - maintenance
  thresholds:
    overall: 75
    performance: 70
    architecture: 80
    scalability: 70
    integrity: 80
    maintenance: 70

ignore:
  paths:
    - node_modules
    - dist
    - .next
    - coverage
    - build
    - out
  rules: []
    # - PERF001  # Uncomment to disable a specific rule by ID

plugins: []
  # - zaria-plugin-nextjs
  # - zaria-plugin-prisma

sre:
  enabled: false
  # Uncomment and configure to enable SRE data enrichment:
  # providers:
  #   - type: prometheus
  #     url: https://prometheus.internal.example.com
  #     auth:
  #       type: bearer
  #       token: ${PROMETHEUS_TOKEN}
  #   - type: datadog
  #     apiKey: ${DATADOG_API_KEY}
  #     appKey: ${DATADOG_APP_KEY}
  #   - type: grafana
  #     url: https://grafana.internal.example.com
  #     auth:
  #       type: bearer
  #       token: ${GRAFANA_TOKEN}

output:
  format: terminal   # terminal | json | html | markdown | sarif
  colors: true
  detail: standard   # minimal | standard | verbose
